apiVersion: v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 3
  selector:
    matchlabels:
      app: swiggy
  template:
    metadata:
      labels:
        app: swiggy
    spec:
      containers:
        - name: cont1
          image: nagasshankar8916/library:app_img
          ports:
            - containerPort: 5000


apiVersion: v1
kind: Service
metadata:
  name: myui
spec:
  selector:
    app: swiggy
  type: loadBalancer
  ports:
    port: 80
    targetPort: 5000
          
